name: Manual Deploy

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Git tag to deploy"
        required: true
        type: string

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag }}

      - name: Print tag
        run: echo "Deploying tag ${{ github.event.inputs.tag }}"